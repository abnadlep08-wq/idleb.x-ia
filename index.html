<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idleb X IA - منصة الذكاء الاصطناعي لتعديل الفيديوهات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">Idleb <span>X IA</span></a>
                <div class="nav-links">
                    <a href="#home">الرئيسية</a>
                    <a href="#features">المميزات</a>
                    <a href="#pricing">الباقات</a>
                </div>
                <div class="nav-buttons">
                    <button class="btn btn-outline" onclick="openLoginModal()">تسجيل الدخول</button>
                    <button class="btn btn-primary" onclick="openSignupModal()">إنشاء حساب</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- نافذة تسجيل الدخول المنبثقة -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="loginForm" class="auth-form active">
                <h2>تسجيل الدخول</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="loginPassword" placeholder="كلمة المرور" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">دخول</button>
                </form>
                <p class="auth-switch">ليس لديك حساب؟ <a href="#" onclick="showSignup()">إنشاء حساب</a></p>
            </div>

            <div id="signupForm" class="auth-form">
                <h2>إنشاء حساب جديد</h2>
                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <input type="text" id="signupName" placeholder="الاسم الكامل" required>
                    </div>
                    <div class="form-group">
                        <input type="email" id="signupEmail" placeholder="البريد الإلكتروني" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="signupPassword" placeholder="كلمة المرور" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">إنشاء حساب</button>
                </form>
                <p class="auth-switch">لديك حساب بالفعل؟ <a href="#" onclick="showLogin()">تسجيل دخول</a></p>
            </div>
        </div>
    </div>

    <!-- باقي أقسام الصفحة (Hero, Features, etc) -->
    <section class="hero">
        <!-- ... المحتوى ... -->
    </section>

    <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
