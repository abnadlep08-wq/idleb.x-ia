<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تبديل الوجه - Idleb X IA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .face-swap-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }
        
        .upload-box {
            text-align: center;
            padding: 40px;
            border: 3px dashed #ddd;
            border-radius: 15px;
            cursor: pointer;
        }
        
        .upload-box:hover {
            border-color: #8B5CF6;
        }
        
        .preview-box {
            text-align: center;
            padding: 20px;
        }
        
        .preview-box img, .preview-box video {
            max-width: 100%;
            border-radius: 10px;
            max-height: 200px;
        }
        
        .process-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin: 20px 0;
        }
        
        .result-box {
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">Idleb <span>X IA</span></a>
                <div class="nav-buttons">
                    <a href="index.html" class="btn btn-outline">الرئيسية</a>
                </div>
            </nav>
        </div>
    </header>

    <div class="face-swap-container">
        <h1 style="text-align: center; margin-bottom: 20px;">✨ وجّهك على أي فيديو</h1>
        <p style="text-align: center; color: #666;">حط صورتك وأي فيديو، الذكاء الاصطناعي يركب وجهك عليه</p>
        
        <div class="upload-grid">
            <!-- رفع الصورة -->
            <div class="upload-box" id="imageBox" onclick="document.getElementById('imageInput').click()">
                <i class="fas fa-user" style="font-size: 40px; color: #8B5CF6;"></i>
                <h3>ارفع صورتك</h3>
                <p>JPG, PNG</p>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
            </div>
            
            <!-- رفع الفيديو -->
            <div class="upload-box" id="videoBox" onclick="document.getElementById('videoInput').click()">
                <i class="fas fa-video" style="font-size: 40px; color: #8B5CF6;"></i>
                <h3>ارفع الفيديو</h3>
                <p>MP4, MOV</p>
                <input type="file" id="videoInput" accept="video/*" style="display: none;">
            </div>
        </div>
        
        <!-- معاينة -->
        <div class="upload-grid" id="previewGrid" style="display: none;">
            <div class="preview-box">
                <h4>صورتك</h4>
                <img id="imagePreview" src="">
            </div>
            <div class="preview-box">
                <h4>الفيديو الأصلي</h4>
                <video id="videoPreview" controls></video>
            </div>
        </div>
        
        <!-- زر المعالجة -->
        <button class="btn btn-primary process-btn" id="processBtn" onclick="processFaceSwap()">
            <i class="fas fa-magic"></i>
            ركب وجهي على الفيديو
        </button>
        
        <!-- النتيجة -->
        <div class="result-box" id="resultBox" style="display: none;">
            <h3>🎉 الفيديو بعد تبديل الوجه</h3>
            <video id="resultVideo" controls style="width: 100%; margin: 20px 0;"></video>
            <a href="#" id="downloadBtn" class="btn btn-primary" download>
                <i class="fas fa-download"></i> تحميل الفيديو
            </a>
            <button class="btn btn-outline" onclick="resetAll()" style="margin-right: 10px;">
                جرب مرة ثانية
            </button>
        </div>
    </div>

    <script>
        let imageFile = null;
        let videoFile = null;
        
        // رفع الصورة
        document.getElementById('imageInput').addEventListener('change', function(e) {
            imageFile = e.target.files[0];
            if (imageFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                }
                reader.readAsDataURL(imageFile);
                checkFiles();
            }
        });
        
        // رفع الفيديو
        document.getElementById('videoInput').addEventListener('change', function(e) {
            videoFile = e.target.files[0];
            if (videoFile) {
                const url = URL.createObjectURL(videoFile);
                document.getElementById('videoPreview').src = url;
                checkFiles();
            }
        });
        
        // التحقق من اكتمال الملفين
        function checkFiles() {
            if (imageFile && videoFile) {
                document.getElementById('previewGrid').style.display = 'grid';
                document.getElementById('imageBox').style.display = 'none';
                document.getElementById('videoBox').style.display = 'none';
            }
        }
        
        // معالجة تبديل الوجه
        async function processFaceSwap() {
            if (!imageFile || !videoFile) {
                alert('الرجاء اختيار الصورة والفيديو أولاً');
                return;
            }
            
            document.getElementById('processBtn').disabled = true;
            document.getElementById('processBtn').innerHTML = 'جاري المعالجة... ⏳';
            
            // هنا راح نستخدم API الحقيقي لتبديل الوجه
            // حالياً للعرض السريع راح نستخدم فيديو تجريبي
            
            setTimeout(() => {
                const mockResult = "https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4";
                
                document.getElementById('resultVideo').src = mockResult;
                document.getElementById('downloadBtn').href = mockResult;
                document.getElementById('resultBox').style.display = 'block';
                
                document.getElementById('processBtn').disabled = false;
                document.getElementById('processBtn').innerHTML = '<i class="fas fa-magic"></i> ركب وجهي على الفيديو';
            }, 3000);
        }
        
        function resetAll() {
            document.getElementById('imageInput').value = '';
            document.getElementById('videoInput').value = '';
            document.getElementById('previewGrid').style.display = 'none';
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('imageBox').style.display = 'block';
            document.getElementById('videoBox').style.display = 'block';
            imageFile = null;
            videoFile = null;
        }
    </script>
</body>
          </html>
